[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "benchcraft-lazytune"
version = "0.1.0"
description = "Benchcraft LazyTune: Adapter-Factory pattern for local LLM fine-tuning -- BaseTrainingAdapter + a ProgrammaticAdapter doing real (tiny) LoRA fine-tuning via peft/transformers."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benchcraft" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

# Per architecture doc Part 3 ("Module 6: LazyTune"): unlike LazyClean,
# LazyTune's whole reason for existing is to unify PyTorch/HuggingFace-based
# fine-tuning tooling (Axolotl/LLaMA-Factory/Unsloth/TRL/torchtune). The
# "no PyTorch/HuggingFace" constraint elsewhere in this repo belongs to
# LazyClean specifically, not LazyTune -- torch/transformers/peft here are
# intentional, expected dependencies.
#
# lazycore is a local sibling package (packages/lazycore) and is not listed
# here as a formal path dependency -- hatchling/pip do not have a portable,
# idiomatic way to express a relative-path dependency in pyproject.toml
# metadata. Matching the convention established in packages/automl and
# packages/lazyclean: install it first -- `pip install -e packages/lazycore`
# -- before installing this package. See README "Installation".
dependencies = [
    "torch>=2.1",
    "transformers>=4.40",
    "peft>=0.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/benchcraft_lazytune"]
