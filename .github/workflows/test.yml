name: Test

# Runs the real pytest suite for every subpackage of packages/dscraft (the
# single consolidated package that replaced the nine previously-separate
# packages under packages/). This exists because CodeRabbit (the required
# status check on main) reviews code quality/style/docs -- it does not
# execute any test suite. Without this workflow, nothing automated verifies
# that `pytest packages/dscraft/tests/<subpackage>` actually passes before a
# PR can merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.subpackage }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # core has no extra of its own -- its only dependency
          # (opentelemetry-api) is a hard dependency of the base package,
          # always installed regardless of extras.
          - subpackage: core
            extras: dev
            runs-on: ubuntu-latest
          # automl's ONNX export path (.compile() -> skl2onnx) is behind
          # the optional `automl-onnx` extra, not the `automl` extra itself.
          - subpackage: automl
            extras: "automl,automl-onnx,dev"
            runs-on: ubuntu-latest
          - subpackage: clean
            extras: "clean,dev"
            runs-on: ubuntu-latest
          - subpackage: forecast
            extras: "forecast,dev"
            runs-on: ubuntu-latest
          # Heavy: torch + torch_geometric.
          - subpackage: graph
            extras: "graph,dev"
            runs-on: ubuntu-latest
          # Heavy: torch + onnx + onnxscript.
          - subpackage: vision
            extras: "vision,dev"
            runs-on: ubuntu-latest
          # Heavy: torch + transformers + peft.
          - subpackage: tune
            extras: "tune,dev"
            runs-on: ubuntu-latest
          # security and agent's test suites exercise the *real*
          # dscraft.core.sandbox executor (not a mock). Per CLAUDE.md/the
          # architecture doc (Mac sandboxing uses Seatbelt; the Linux
          # namespace backend is an explicit, documented, unimplemented
          # stub that always raises SandboxBackendUnavailableError), these
          # tests can only genuinely pass on macOS today. Running them on
          # ubuntu-latest doesn't test "the same thing but on Linux" --
          # it deterministically fails by design, every time, regardless
          # of any real regression. Use a real Apple Silicon runner so
          # this job actually exercises the intended code path, matching
          # this repo's stated primary reference platform. Both extras are
          # currently empty lists in pyproject.toml (stdlib + core only),
          # but are still installed explicitly here for forward-compatibility
          # and clarity should either gain real dependencies later.
          - subpackage: security
            extras: "security,dev"
            runs-on: macos-14
          - subpackage: agent
            extras: "agent,dev"
            runs-on: macos-14
          - subpackage: eda
            extras: "eda,dev"
            runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/dscraft/pyproject.toml

      - name: Install dscraft[${{ matrix.extras }}]
        run: pip install -e "packages/dscraft[${{ matrix.extras }}]"

      - name: Run pytest
        run: pytest packages/dscraft/tests/${{ matrix.subpackage }}

  # Lightweight "doc testing" companion to the pytest matrix above: this
  # only checks that every packages/dscraft/examples/*/*.py script is at
  # least syntactically valid Python (py_compile parses/compiles but does
  # not execute or import anything, so it needs none of the subpackages'
  # heavy runtime dependencies installed). It will not catch a broken
  # import or a genuinely broken example, only outright syntax
  # errors/typos -- a deliberately proportionate check for a young,
  # fast-moving repo rather than a full "execute every README/example
  # end-to-end" harness.
  examples-syntax:
    name: examples syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check every subpackage's examples
        run: python -m py_compile packages/dscraft/examples/*/*.py
