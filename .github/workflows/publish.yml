name: Publish

# Publishes the single DSCraft package (packages/dscraft) to PyPI via
# Trusted Publishing (OIDC) whenever a tag matching v<version> is pushed,
# e.g. `v0.2.0`. No PyPI API token is stored as a secret --
# pypa/gh-action-pypi-publish exchanges this workflow's OIDC token for a
# short-lived upload credential, per the trusted publisher configured on
# the project on PyPI's side. This is a deliberately blank-environment
# trusted publisher (see the job below), so this workflow must never gain
# an `environment:` key -- doing so would stop matching what's configured
# on PyPI.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse version from tag
        id: parse
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          # Tag shape is v<version>, e.g. v0.2.0. There is only one
          # installable package now (packages/dscraft), so the tag is
          # nothing but the version with a leading `v` stripped.
          version="${tag#v}"

          if [[ -z "$version" || "$version" == "$tag" ]]; then
            echo "::error::Could not parse a v<version> tag from '${tag}'."
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag version matches pyproject.toml version
        env:
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          set -euo pipefail

          pyproject_path="packages/dscraft/pyproject.toml"

          declared_version="$(PYPROJECT_PATH="$pyproject_path" python -c "
          import os
          import tomllib
          with open(os.environ['PYPROJECT_PATH'], 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")"

          if [[ "$declared_version" != "$VERSION" ]]; then
            echo "::error::Tag version '${VERSION}' does not match ${pyproject_path} version '${declared_version}'. Bump pyproject.toml before tagging."
            exit 1
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build packages/dscraft

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/dscraft/dist
